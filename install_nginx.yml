---
- name: Install Nginx on Slave2
  hosts: slave2
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create index page
      copy:
        content: "<h1>Nginx is running on Slave2!</h1>"
        dest: /var/www/html/index.html
