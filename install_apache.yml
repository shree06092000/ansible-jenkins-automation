---
- name: Install Apache2 on Slave1
  hosts: slave1
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Start and enable Apache2
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create index page
      copy:
        content: "<h1>Apache2 is running on Slave1!</h1>"
        dest: /var/www/html/index.html
